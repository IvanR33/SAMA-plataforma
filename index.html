<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>SAMA | Plataforma de Gestión Educativa</title>
</head>
<body>
    <header>
        <h1>SAMA Portal</h1>
        <p>Sistema de Asistencia Multimodal y Asincrónica</p>
    </header>

    <main>
        <!-- Sección de Cápsulas -->
        <section id="capsulas">
            <h2>Cápsulas de Micro-learning</h2>
            <div class="card-video">
                <h3>Curso MongoDB: Fundamentos (10:00)</h3>
                <!-- Video técnico sobre MongoDB -->
                <iframe width="100%" height="315" src="https://www.youtube.com/embed/pW8yZ4kEsi8" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </section>

        <!-- Sección de Tickets -->
        <section id="tickets">
            <h2>Tickets de Requerimiento</h2>
            <div id="ticket-container">
                <!-- Se inyecta mediante JS -->
            </div>
        </section>

        <!-- Sección Discord -->
        <section id="discord">
            <a href="https://discord.com" target="_blank" class="btn-discord">🚀 Unirse a Discord 24/7</a>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
