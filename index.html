<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SAMA | Plataforma SAMA</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; padding: 20px; }
        .card-video { background: #161b22; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .ticket-card { background: #161b22; padding: 20px; border-radius: 12px; border-left: 5px solid #22d3ee; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>SAMA Portal</h1>
    
    <div class="card-video">
        <h3>Introducción a MongoDB</h3>
        <iframe width="100%" height="315" src="https://www.youtube.com/embed/-bt_y4Loofg" frameborder="0" allowfullscreen></iframe>
    </div>

    <h2>Tickets de Requerimiento</h2>
    <div id="ticket-container">
        <div class="ticket-card">
            <h3 id="ticket-title">#104 - Optimizar conexión Base de Datos Oracle</h3>
            <p id="status-text">Estado: Pendiente</p>
            <button id="btn-resolver" onclick="resolver()">Resolver</button>
        </div>
    </div>

    <script>
        function resolver() {
            const btn = document.getElementById('btn-resolver');
            const status = document.getElementById('status-text');
            btn.innerText = "Procesando...";
            setTimeout(() => {
                status.innerText = "Estado: Completado";
                btn.innerText = "¡Ticket Resuelto!";
                btn.style.backgroundColor = "#10b981";
            }, 1000);
        }
    </script>
</body>
</html>
